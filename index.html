/* ── Level builder ──────────────────────────────────────────────────────────
   ops: [char, x1, y1, x2=x1, y2=y1]  fills rectangle in grid
   Tile chars: # solid  . air  W light-only  V dark-only
               l light-spawn  d dark-spawn  E light-exit  X dark-exit
               T spike-both  Q spike-kills-light  Z spike-kills-dark
               1-9 gate tile (solid=closed, passable=open)
*/
function mkLv(ops,hint,objs=[]){
  const g=Array.from({length:GH},()=>Array(GW).fill('.'));
  for(let x=0;x<GW;x++){g[0][x]='#';g[GH-1][x]='#';}
  for(let y=0;y<GH;y++){g[y][0]='#';g[y][GW-1]='#';}
  for(const op of ops){
    const[c,x1,y1,x2=x1,y2=y1]=op;
    for(let y=y1;y<=y2;y++)for(let x=x1;x<=x2;x++)
      if(x>=0&&x<GW&&y>=0&&y<GH)g[y][x]=c;
  }
  const rows=g.map(r=>r.join(''));
  let ls={x:3,y:2},ds={x:36,y:2};
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    if(rows[y][x]==='l')ls={x,y};
    if(rows[y][x]==='d')ds={x,y};
  }
  return{rows,lspawn:ls,dspawn:ds,objs,hint};
}

 {t:'m',x1:11,y1:15,x2:28,y2:15,s:2.4},{t:'m',x1:12,y1:5,x2:27,y2:5,s:1.8}])
];

/* ── State ──────────────────────────────────────────────────────────────────*/
const S={
  screen:'menu',role:null,me:'light',other:'dark',
  peer:null,conn:null,connected:false,
  level:0,deaths:0,
  gateOpen:{},leverToggle:{},
  movPlats:[],
  P:{},L:null,
  atExit:{light:false,dark:false},
  atExitLatch:{light:false,dark:false},
  win:false,transitioning:false,ping:0,
};
const keys={l:false,r:false,j:false,jPress:false};
addEventListener('keydown',e=>{
  if(e.repeat)return;
  if(['ArrowLeft','KeyA'].includes(e.code))keys.l=true;
  if(['ArrowRight','KeyD'].includes(e.code))keys.r=true;
  if(['ArrowUp','KeyW','Space'].includes(e.code)){keys.j=true;keys.jPress=true;e.preventDefault();}
  if(e.code==='KeyR'&&S.screen==='game')requestRestart();
});
addEventListener('keyup',e=>{
  if(['ArrowLeft','KeyA'].includes(e.code))keys.l=false;
  if(['ArrowRight','KeyD'].includes(e.code))keys.r=false;
  if(['ArrowUp','KeyW','Space'].includes(e.code))keys.j=false;
});

/* ── Network ─────────────────────────────────────────────────────────────── */
const $=id=>document.getElementById(id);
const randCode=()=>{const a='ABCDEFGHJKMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<5;i++)s+=a[Math.random()*a.length|0];return s;};
const PFX='tmsv4-';
// Reliable ICE servers: Google STUN + Open Relay TURN (free, no account needed)
const ICE={config:{iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'},
]}};
function setStatus(h){$('status').innerHTML=h;}
function send(m){if(S.conn&&S.conn.open)try{S.conn.send(m);}catch(_){}}

$('btnHost').onclick=()=>{
  const code=randCode();
  setStatus('Создаю комнату…');
  const peer=new Peer(PFX+code.toLowerCase(),ICE);
  S.peer=peer;S.role='host';S.me='light';S.other='dark';
  peer.on('open',()=>{
    setStatus(`Код комнаты:<br><span id="roomCode">${code}</span><br>Отправь второму игроку и жди…`);
    $('btnHost').style.display=$('btnJoinShow').style.display=$('joinRow').style.display='none';
  });
  peer.on('connection',c=>{if(S.conn){c.close();return;}bindConn(c);});
  peer.on('error',e=>setStatus('Ошибка: '+e.type+'. Обнови страницу.'));
};
$('btnJoinShow').onclick=()=>{$('joinRow').style.display='flex';$('codeInput').focus();};
$('btnJoin').onclick=joinGame;
$('btnSolo').onclick=()=>{
  S.role='solo';S.me='light';S.other='dark';S.connected=true;
  startGame();
};
$('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter')joinGame();});
function joinGame(){
  const code=$('codeInput').value.trim().toLowerCase();
  if(code.length<4){setStatus('Введи 5-значный код.');return;}
  setStatus('Подключаюсь…');
  const peer=new Peer(ICE);
  S.peer=peer;S.role='guest';S.me='dark';S.other='light';
  peer.on('open',()=>{
    const c=peer.connect(PFX+code,{reliable:true,config:ICE.config});
    bindConn(c);
    setTimeout(()=>{if(!S.connected)setStatus('Не удалось. Проверь код.');},15000);
  });
  peer.on('error',e=>setStatus('Ошибка: '+e.type));
}
function bindConn(c){
  S.conn=c;
  c.on('open',()=>{
    S.connected=true;
    if(S.role==='guest')send({t:'hi'});
    else{send({t:'start',level:S.level});startGame();}
  });
  c.on('data',onMsg);
  c.on('close',()=>{S.connected=false;if(S.screen==='game')showBig('СВЯЗЬ ПОТЕРЯНА','Второй игрок отключился.\nОбнови страницу.');});
}
function onMsg(m){
  switch(m.t){
    case 'hi':send({t:'start',level:S.level});startGame();break;
    case 'start':S.level=m.level;startGame();break;
    case 'p':{const o=S.P[S.other];if(!o)break;o.tx=m.x;o.ty=m.y;o.face=m.f;o.seen=true;break;}
    case 'st':if(S.role==='guest'){S.gateOpen=m.go;S.leverToggle=m.lt;S.deaths=m.d;
      m.mp.forEach((p,i)=>{if(S.movPlats[i]){S.movPlats[i].cx=p.x;S.movPlats[i].cy=p.y;}});}break;
    case 'exit':S.atExitLatch[m.role]=true;break;
    case 'lever':if(S.role==='host')toggleLever(m.id);break;
    case 'dead':if(S.role==='host')doDeath();break;
    case 'restart':if(S.role==='host')doDeath();break;
    case 'next':S.level=m.level;loadLevel();showBanner();break;
    case 'win':doWin();break;
    case 'png':send({t:'pong',ts:m.ts});break;
    case 'pong':S.ping=Math.round(performance.now()-m.ts);break;
  }
}
function requestRestart(){if(S.transitioning||S.win)return;if(S.role==='host')doDeath();else send({t:'restart'});}
setInterval(()=>{if(S.connected)send({t:'png',ts:performance.now()});},2500);

/* ── Game flow ───────────────────────────────────────────────────────────── */
function startGame(){
  S.screen='game';$('menu').style.display='none';$('gameWrap').style.display='block';
  loadLevel();showBanner();loop();
}
function loadLevel(){
  S.L=LEVELS[S.level];
  S.gateOpen={};S.leverToggle={};S._leverTouched={};
  S.atExit={light:false,dark:false};
  S.atExitLatch={light:false,dark:false};
  S.transitioning=false;
  $('bigMsg').style.display='none';
  S.movPlats=(S.L.objs||[]).filter(o=>o.t==='m').map(o=>({
    x1:o.x1,y1:o.y1,x2:o.x2,y2:o.y2,s:o.s,
    cx:o.x1*T,cy:o.y1*T,fwd:true,w:3*T,h:T/2
  }));
  const ls=S.L.lspawn,ds=S.L.dspawn;
  spawnP('light',ls.x*T+T/2-PW/2,ls.y*T+T-PH);
  spawnP('dark',ds.x*T+T/2-PW/2,ds.y*T+T-PH);
  updateHUD();
}
function spawnP(role,px,py){
  S.P[role]={x:px,y:py,vx:0,vy:0,face:1,onGround:false,
    tx:px,ty:py,seen:false,onPlat:-1,role};
}
function doDeath(){
  if(S.transitioning)return;
  S.deaths++;
  flashBig('💀 СМЕРТЬ…','Возрождение…');
  setTimeout(()=>{loadLevel();if(S.connected)send({t:'reset'});},900);
}
function nextLevel(){
  if(S.transitioning)return;S.transitioning=true;
  if(S.level>=LEVELS.length-1){if(S.role==='host')send({t:'win'});doWin();return;}
  S.level++;
  flashBig('✨ УРОВЕНЬ ПРОЙДЕН!','Следующий уровень…');
  setTimeout(()=>{if(S.role==='host')send({t:'next',level:S.level});loadLevel();showBanner();},1600);
}
function doWin(){S.win=true;showBig('🌟 ПОБЕДА!','Вы прошли все 15 уровней!\nТьма и Свет едины. Вы свободны. ✨');}
function showBig(t1,t2){$('bm1').textContent=t1;$('bm2').textContent=t2;$('bigMsg').style.display='flex';}
function flashBig(t1,t2){showBig(t1,t2);setTimeout(()=>$('bigMsg').style.display='none',800);}
function showBanner(){const n=S.level+1,h=S.L.hint||'';showBig(`Уровень ${n} / 15`,h);setTimeout(()=>$('bigMsg').style.display='none',3200);}
function updateHUD(){
  $('hudLv').textContent=`Уровень ${S.level+1} / 15`;
  $('hudRole').textContent=S.me==='light'?'⚜ Свет':'◆ Тьма';
  $('hudRole').style.color=S.me==='light'?'#ffd966':'#b265ff';
  $('hudDeaths').textContent=`💀 ${S.deaths}`;
  $('hudPing').textContent=S.connected?`${S.ping}ms`:'';
}

/* ── Tiles ───────────────────────────────────────────────────────────────── */
function tileAt(tx,ty){
  if(tx<0||tx>=GW||ty<0||ty>=GH)return '#';
  return S.L.rows[ty][tx];
}
function isGate(c){return c>='1'&&c<='9';}
function isSolid(tx,ty,role){
  if(tx<0||tx>=GW||ty<0||ty>=GH)return true;
  const c=tileAt(tx,ty);
  if(c==='#')return true;
  if(c==='W')return role==='light';
  if(c==='V')return role==='dark';
  if(isGate(c))return!S.gateOpen[c];
  return false;
}

/* ── Physics ─────────────────────────────────────────────────────────────── */
function moveAxis(p,axis,delta){
  const role=p.role;
  if(axis==='x'){
    p.x+=delta;
    const l=Math.floor(p.x/T),r=Math.floor((p.x+PW-1)/T);
    const yt=Math.floor(p.y/T),yb=Math.floor((p.y+PH-1)/T);
    for(let ty=yt;ty<=yb;ty++){
      if(delta>0&&isSolid(r,ty,role)){p.x=r*T-PW-0.01;p.vx=0;break;}
      if(delta<0&&isSolid(l,ty,role)){p.x=(l+1)*T+0.01;p.vx=0;break;}
    }
  }else{
    p.y+=delta;
    const t2=Math.floor(p.y/T),b2=Math.floor((p.y+PH-1)/T);
    const xl=Math.floor(p.x/T),xr=Math.floor((p.x+PW-1)/T);
    p.onGround=false;
    for(let tx=xl;tx<=xr;tx++){
      if(delta>0&&isSolid(tx,b2,role)){p.y=b2*T-PH-0.01;p.vy=0;p.onGround=true;break;}
      if(delta<0&&isSolid(tx,t2,role)){p.y=(t2+1)*T+0.01;p.vy=0;break;}
    }
  }
}
function updatePhysics(p){
  // moving platform attachment
  p.onPlat=-1;
  for(let i=0;i<S.movPlats.length;i++){
    const pl=S.movPlats[i];
    if(p.x+PW>pl.cx&&p.x<pl.cx+pl.w&&p.y+PH>=pl.cy-2&&p.y+PH<=pl.cy+6&&p.vy>=0){
      p.onGround=true;p.onPlat=i;p.y=pl.cy-PH;p.vy=0;
    }
  }
  const tv=(keys.l?-1:0)+(keys.r?1:0);
  p.vx+=(tv*RUN-p.vx)*ACC;
  if(tv===0)p.vx*=FRICT;
  if(Math.abs(p.vx)<0.05)p.vx=0;
  if(tv>0)p.face=1;else if(tv<0)p.face=-1;
  if(keys.jPress){if(p.onGround){p.vy=JUMP;p.onGround=false;}keys.jPress=false;}
  p.vy=Math.min(p.vy+GRAV,MAXFALL);
  if(p.onPlat>=0){
    const pl=S.movPlats[p.onPlat];
    const dx=(pl.x2-pl.x1),dy=(pl.y2-pl.y1);
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    p.x+=(pl.fwd?1:-1)*dx/len*pl.s;
    p.y+=(pl.fwd?1:-1)*dy/len*pl.s;
  }
  moveAxis(p,'x',p.vx);
  moveAxis(p,'y',p.vy);
  if(p.x<0){p.x=0;p.vx=0;}
  if(p.x+PW>GW*T){p.x=GW*T-PW;p.vx=0;}
}

/* ── Objects ─────────────────────────────────────────────────────────────── */
function updateObjects(myp){
  // levers
  for(const o of S.L.objs){
    if(o.t==='l'){
      const lx=o.x*T,ly=o.y*T,key=o.x+','+o.y;
      const touched=myp.x+PW>lx&&myp.x<lx+T&&myp.y+PH>ly&&myp.y<ly+T;
      if(touched&&!S._leverTouched[key]){
        if(S.role==='host')toggleLever(key);
        else send({t:'lever',id:key});
        S._leverTouched[key]=true;
      }
      if(!touched)delete S._leverTouched[key];
    }
  }
  // buttons (checked for both players every frame by host)
  if(S.role==='host'){
    const btnObjs=S.L.objs.filter(o=>o.t==='b');
    const pressed={};
    const needed={};
    for(const o of btnObjs){
      if(!pressed[o.g])pressed[o.g]=0;
      if(!needed[o.g])needed[o.g]=0;
      needed[o.g]++;
      const bx=o.x*T,by=o.y*T;
      const check=p=>p.x+PW>bx+2&&p.x<bx+T-2&&Math.abs((p.y+PH)-(by+T))<10;
      if(check(S.P[S.me])||( S.P[S.other]&&S.P[S.other].seen&&check(S.P[S.other])))pressed[o.g]++;
    }
    for(const o of btnObjs){
      S.gateOpen[o.g]=o.a?pressed[o.g]>=needed[o.g]:pressed[o.g]>0;
    }
  }
}
function toggleLever(key){
  S.leverToggle[key]=!S.leverToggle[key];
  for(const o of S.L.objs){
    if(o.t==='l'&&(o.x+','+o.y)===key)S.gateOpen[o.g]=S.leverToggle[key];
  }
}
function updateMovPlats(){
  for(const pl of S.movPlats){
    const dx=(pl.x2-pl.x1)*T,dy=(pl.y2-pl.y1)*T;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    pl.cx+=(pl.fwd?1:-1)*dx/len*pl.s;
    pl.cy+=(pl.fwd?1:-1)*dy/len*pl.s;
    const tx=pl.cx-pl.x1*T,ty2=pl.cy-pl.y1*T;
    const prog=Math.sqrt(tx*tx+ty2*ty2);
    if(prog>=len)pl.fwd=false;
    if(prog<=0)pl.fwd=true;
  }
}
function checkTraps(p,role){
  const cl=Math.floor(p.x/T),cr=Math.floor((p.x+PW-1)/T);
  const ct=Math.floor(p.y/T),cb=Math.floor((p.y+PH-1)/T);
  for(let tx=cl;tx<=cr;tx++)for(let ty=ct;ty<=cb;ty++){
    const c=tileAt(tx,ty);
    if(c==='T'||(c==='Q'&&role==='light')||(c==='Z'&&role==='dark')){
      if(S.role==='host'||S.role==='solo')doDeath();else send({t:'dead'});return;
    }
    if((c==='E'&&role==='light')||(c==='X'&&role==='dark')){
      S.atExit[role]=true;
      if(!S.atExitLatch[role]){S.atExitLatch[role]=true;send({t:'exit',role});}
    }
  }
  if(p.y>GH*T+60){if(S.role==='host')doDeath();else send({t:'dead'});}
}

/* ── Main update ─────────────────────────────────────────────────────────── */
let lastSync=0,lastState=0;
function update(){
  if(S.screen!=='game'||S.win||S.transitioning)return;
  updateMovPlats();
  const myp=S.P[S.me];
  if(myp){updatePhysics(myp);updateObjects(myp);checkTraps(myp,S.me);}
  const op=S.P[S.other];
  if(op&&op.seen){op.x+=(op.tx-op.x)*0.28;op.y+=(op.ty-op.y)*0.28;}
  const now=performance.now();
  if(myp&&now-lastSync>33){send({t:'p',x:myp.x,y:myp.y,f:myp.face});lastSync=now;}
  if(S.role==='host'&&now-lastState>100){
    send({t:'st',go:S.gateOpen,lt:S.leverToggle,d:S.deaths,
          mp:S.movPlats.map(p=>({x:p.cx,y:p.cy}))});lastState=now;
  }
  // In solo mode, reaching the light exit is enough to advance
  if(S.role==='solo'&&S.atExitLatch.light&&!S.transitioning)nextLevel();
  if(S.role!=='solo'&&S.atExitLatch.light&&S.atExitLatch.dark&&!S.transitioning)nextLevel();
  S.atExit.light=S.atExit.dark=false;
  updateHUD();
}

/* ── Render ──────────────────────────────────────────────────────────────── */
const cv=$('cv'),ctx=cv.getContext('2d');
let animT=0;
function hexA(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

function render(){
  animT+=0.04;
  // gradient background
  const bg=ctx.createLinearGradient(0,0,0,cv.height);
  bg.addColorStop(0,'#06061a');bg.addColorStop(1,'#03030e');
  ctx.fillStyle=bg;ctx.fillRect(0,0,cv.width,cv.height);
  const L=S.L;if(!L)return;

  // exit glow halos (behind everything)
  const pulse=0.7+0.3*Math.sin(animT*2.5);
  for(let ry=0;ry<GH;ry++)for(let rx=0;rx<GW;rx++){
    const c=L.rows[ry][rx];
    if(c!=='E'&&c!=='X')continue;
    const px=rx*T+T/2,py=ry*T+T/2;
    const col=c==='E'?'#ffd966':'#b265ff';
    const gr=ctx.createRadialGradient(px,py,0,px,py,70*pulse);
    gr.addColorStop(0,hexA(col,0.22*pulse));gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.fillRect(px-70,py-70,140,140);
  }

  // draw tiles
  for(let ry=0;ry<GH;ry++)for(let rx=0;rx<GW;rx++){
    const c=L.rows[ry][rx];const px=rx*T,py=ry*T;
    if(c==='.')continue;
    if(c==='#'){
      // base fill – brighter than before
      ctx.fillStyle='#141428';ctx.fillRect(px,py,T,T);
      // inner subtle pattern
      ctx.fillStyle='rgba(40,40,90,.4)';ctx.fillRect(px+1,py+1,T-2,T-2);
      // bright grid lines
      ctx.strokeStyle='#3a3a88';ctx.lineWidth=1;ctx.strokeRect(px+.5,py+.5,T-1,T-1);
      // neon top & left edge highlights
      ctx.fillStyle='rgba(100,100,200,.7)';ctx.fillRect(px,py,T,2);
      ctx.fillStyle='rgba(80,80,180,.4)';ctx.fillRect(px,py,2,T);
    }else if(c==='W'){
      ctx.fillStyle='#201500';ctx.fillRect(px,py,T,T);
      ctx.strokeStyle='#c8a030';ctx.lineWidth=1.5;ctx.strokeRect(px+.5,py+.5,T-1,T-1);
      // gold glow top stripe
      ctx.fillStyle='rgba(220,170,40,.9)';ctx.fillRect(px,py,T,3);
      ctx.shadowBlur=8;ctx.shadowColor='#ffd966';
      ctx.fillStyle='rgba(255,210,80,.15)';ctx.fillRect(px,py,T,T);
      ctx.shadowBlur=0;
    }else if(c==='V'){
      ctx.fillStyle='#0e0020';ctx.fillRect(px,py,T,T);
      ctx.strokeStyle='#8040c0';ctx.lineWidth=1.5;ctx.strokeRect(px+.5,py+.5,T-1,T-1);
      ctx.fillStyle='rgba(160,70,230,.9)';ctx.fillRect(px,py,T,3);
      ctx.shadowBlur=8;ctx.shadowColor='#b265ff';
      ctx.fillStyle='rgba(160,80,255,.15)';ctx.fillRect(px,py,T,T);
      ctx.shadowBlur=0;
    }else if(c==='T'||c==='Q'||c==='Z'){
      const col=c==='T'?'#ff2222':c==='Q'?'#ff7700':'#2299ff';
      const bg2=c==='T'?'rgba(50,0,0,.7)':c==='Q'?'rgba(50,20,0,.7)':'rgba(0,15,50,.7)';
      ctx.fillStyle=bg2;ctx.fillRect(px,py,T,T);
      ctx.fillStyle=col;
      for(let i=0;i<3;i++){
        ctx.beginPath();
        ctx.moveTo(px+i*(T/3),py+T);
        ctx.lineTo(px+T/6+i*(T/3),py+5);
        ctx.lineTo(px+T/3+i*(T/3),py+T);
        ctx.closePath();ctx.fill();
      }
      ctx.strokeStyle=col;ctx.lineWidth=0.5;ctx.strokeRect(px+.5,py+.5,T-1,T-1);
    }else if(c==='E'){
      // Light exit – gold door, 2×T tall for visual impact
      const gw=ctx.createLinearGradient(px,py,px,py+T);
      gw.addColorStop(0,'#2a1a00');gw.addColorStop(1,'#1a0e00');
      ctx.fillStyle=gw;ctx.fillRect(px,py,T,T);
      ctx.shadowBlur=20+8*pulse;ctx.shadowColor='#ffd966';
      ctx.strokeStyle='#ffd966';ctx.lineWidth=2.5;ctx.strokeRect(px+1,py+1,T-2,T-2);
      ctx.fillStyle=`rgba(255,210,80,${0.08+0.06*pulse})`;ctx.fillRect(px,py,T,T);
      ctx.fillStyle='#ffe97a';ctx.font='bold 22px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⚜',px+T/2,py+T/2);
      ctx.shadowBlur=0;
    }else if(c==='X'){
      // Dark exit – purple door
      const gv=ctx.createLinearGradient(px,py,px,py+T);
      gv.addColorStop(0,'#160028');gv.addColorStop(1,'#0a0016');
      ctx.fillStyle=gv;ctx.fillRect(px,py,T,T);
      ctx.shadowBlur=20+8*pulse;ctx.shadowColor='#b265ff';
      ctx.strokeStyle='#b265ff';ctx.lineWidth=2.5;ctx.strokeRect(px+1,py+1,T-2,T-2);
      ctx.fillStyle=`rgba(160,80,255,${0.08+0.06*pulse})`;ctx.fillRect(px,py,T,T);
      ctx.fillStyle='#cc88ff';ctx.font='bold 20px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('◆',px+T/2,py+T/2);
      ctx.shadowBlur=0;
    }else if(isGate(c)){
      const open=S.gateOpen[c];
      if(!open){
        ctx.fillStyle='#0c1a30';ctx.fillRect(px,py,T,T);
        ctx.strokeStyle='#2a6ab0';ctx.lineWidth=1.5;ctx.strokeRect(px+.5,py+.5,T-1,T-1);
        ctx.strokeStyle='rgba(50,120,200,.5)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(px+4,py+4);ctx.lineTo(px+T-4,py+T-4);ctx.stroke();
        ctx.beginPath();ctx.moveTo(px+T-4,py+4);ctx.lineTo(px+4,py+T-4);ctx.stroke();
      }else{
        ctx.setLineDash([3,5]);ctx.strokeStyle='rgba(50,120,200,.25)';ctx.lineWidth=1;
        ctx.strokeRect(px+.5,py+.5,T-1,T-1);ctx.setLineDash([]);
      }
    }
  }

  // objects: buttons and levers
  for(const o of L.objs){
    const px=o.x*T,py=o.y*T;
    if(o.t==='b'){
      const open=S.gateOpen[o.g];
      const bc=open?'#40dd40':'#ddaa20';
      ctx.fillStyle=open?'rgba(60,220,60,.35)':'rgba(220,170,30,.25)';
      ctx.fillRect(px+2,py+T-10,T-4,10);
      ctx.shadowBlur=open?10:4;ctx.shadowColor=bc;
      ctx.strokeStyle=bc;ctx.lineWidth=2;ctx.strokeRect(px+2,py+T-10,T-4,10);
      ctx.fillStyle=bc;ctx.font='bold 13px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⊙',px+T/2,py+T-5);
      ctx.shadowBlur=0;
    }
    if(o.t==='l'){
      const on=S.leverToggle[o.x+','+o.y];
      const lc=on?'#40dd40':'#ff7050';
      ctx.fillStyle=on?'rgba(60,220,60,.2)':'rgba(220,80,40,.2)';
      ctx.fillRect(px+4,py+3,T-8,T-6);
      ctx.shadowBlur=on?10:5;ctx.shadowColor=lc;
      ctx.strokeStyle=lc;ctx.lineWidth=2;ctx.strokeRect(px+4,py+3,T-8,T-6);
      ctx.fillStyle=lc;ctx.font='bold 16px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⊗',px+T/2,py+T/2);
      ctx.shadowBlur=0;
    }
  }

  // moving platforms – with glow top
  for(const pl of S.movPlats){
    const pg=ctx.createLinearGradient(pl.cx,pl.cy,pl.cx,pl.cy+pl.h);
    pg.addColorStop(0,'#3050a0');pg.addColorStop(1,'#182050');
    ctx.fillStyle=pg;ctx.fillRect(pl.cx,pl.cy,pl.w,pl.h);
    ctx.shadowBlur=10;ctx.shadowColor='#5070ff';
    ctx.strokeStyle='#5070ff';ctx.lineWidth=1.5;ctx.strokeRect(pl.cx+.5,pl.cy+.5,pl.w-1,pl.h-1);
    ctx.fillStyle='rgba(100,140,255,.8)';ctx.fillRect(pl.cx,pl.cy,pl.w,3);
    ctx.shadowBlur=0;
  }

  // players
  drawPlayer(S.P['light'],'light');
  drawPlayer(S.P['dark'],'dark');

  // hint at bottom
  if($('bigMsg').style.display==='none'&&L.hint){
    ctx.fillStyle='rgba(100,100,160,.7)';ctx.font='12px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(L.hint,cv.width/2,cv.height-4);
  }
}

function drawPlayer(p,role){
  if(!p)return;
  const isL=role==='light';
  const glow=isL?'#ffd966':'#b265ff';
  const cx=p.x+PW/2,cy=p.y+PH/2;

  // outer aura (animated)
  const aSize=36+4*Math.sin(animT*3+(isL?0:Math.PI));
  const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,aSize);
  gr.addColorStop(0,hexA(glow,isL?.20:.18));gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr;ctx.fillRect(cx-aSize,cy-aSize,aSize*2,aSize*2);

  // drop shadow
  ctx.fillStyle='rgba(0,0,0,.35)';rRect(ctx,p.x+4,p.y+4,PW,PH,5);ctx.fill();

  // body gradient
  const bdg=ctx.createLinearGradient(p.x,p.y,p.x,p.y+PH);
  if(isL){bdg.addColorStop(0,'#fffbe0');bdg.addColorStop(0.5,'#ffd966');bdg.addColorStop(1,'#c8900a');}
  else   {bdg.addColorStop(0,'#e0c0ff');bdg.addColorStop(0.5,'#9040e0');bdg.addColorStop(1,'#3a006a');}
  ctx.fillStyle=bdg;rRect(ctx,p.x,p.y,PW,PH,5);ctx.fill();

  // border glow
  ctx.shadowBlur=16;ctx.shadowColor=glow;
  ctx.strokeStyle=glow;ctx.lineWidth=1.8;
  rRect(ctx,p.x,p.y,PW,PH,5);ctx.stroke();
  ctx.shadowBlur=0;

  // head circle
  const hx=cx,hy=p.y+8;
  ctx.fillStyle=isL?'#fff8c0':'#d8a8ff';
  ctx.shadowBlur=8;ctx.shadowColor=glow;
  ctx.beginPath();ctx.arc(hx,hy,6,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // eyes
  const ex=p.face>0?hx+3:hx-3;
  ctx.fillStyle=isL?'#2a1800':'#ffffff';
  ctx.beginPath();ctx.arc(ex,hy,2.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(ex,hy,1,0,Math.PI*2);ctx.fill();

  // "you" indicator
  if(role===S.me){
    ctx.shadowBlur=10;ctx.shadowColor=glow;ctx.fillStyle=glow;
    ctx.font='bold 12px serif';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(isL?'⚜':'◆',cx,p.y-1);ctx.shadowBlur=0;
  }
}
function rRect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);
  c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();
}

/* ── Main loop ───────────────────────────────────────────────────────────── */
let lastT=0;
function loop(ts=0){
  requestAnimationFrame(loop);
  lastT=ts;
  if(S.screen!=='game')return;
  update();render();
}
requestAnimationFrame(loop);
</script>
</body>
